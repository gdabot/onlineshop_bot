services:
  - type: worker
    name: telegram-funnel-bot
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: BOT_TOKEN
        sync: false
      - key: CHANNEL_LINK
        sync: false
